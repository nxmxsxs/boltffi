[package]
name = "bench_boltffi"

[targets.apple]
enabled = true
deployment_target = "16.0"
include_macos = true

[targets.apple.swift]
module_name = "BenchBoltFFI"
output = "bindings/swift"
tools_version = "5.9"

[targets.apple.experimental]
tuple_storage = false

[targets.apple.xcframework]
output = "dist"

[targets.apple.spm]
output = "dist"
distribution = "local"

[targets.android]
enabled = true
min_sdk = 24

[targets.android.kotlin]
package = "com.example.bench_boltffi"
output = "bindings/kotlin"
factory_style = "constructors"

[targets.android.pack]
output = "dist/jniLibs"

[targets.wasm]
enabled = true

[targets.wasm.typescript]
runtime_package = "@boltffi/runtime"
runtime_version = "file:../../../runtime/typescript"

[targets.wasm.optimize]
enabled = true

[targets.wasm.npm]
package_name = "@boltffi/bench"
targets = ["nodejs"]
